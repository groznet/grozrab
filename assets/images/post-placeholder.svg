<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" height="100%">
  <defs>
    <!-- Realistic Paper Aging & Grain Texture -->
    <filter id="paper-texture" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="5" result="noise" />
      <feColorMatrix type="matrix" values="1 0 0 0 0  0 0.87 0 0 0  0 0.70 0 0 0  0 0 0 0.2 0" in="noise" result="coloredNoise" />
      <feBlend in="SourceGraphic" in2="coloredNoise" mode="multiply" />
    </filter>

    <!-- Edge Discoloration & Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.05" />
      <stop offset="60%" stop-color="#a88243" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#261504" stop-opacity="0.8" />
    </radialGradient>

    <!-- Newsprint Halftone Dot Pattern -->
    <pattern id="halftone" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#2b1a08" opacity="0.16" />
    </pattern>

    <!-- Darker Halftone Dot Pattern for Archival Photo -->
    <pattern id="photo-halftone" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.1" fill="#1f1103" opacity="0.32" />
    </pattern>
  </defs>

  <!-- Base Old Yellowed Newspaper Page -->
  <rect width="100%" height="100%" fill="#d6c39e" filter="url(#paper-texture)" />
  <rect width="100%" height="100%" fill="url(#halftone)" />

  <!-- Top Slogan Line -->
  <text x="400" y="24" font-family="serif" font-style="italic" font-size="11" fill="#2b1a08" opacity="0.75" text-anchor="middle">Пролетарии всех стран, соединяйтесь!</text>

  <!-- MASTHEAD HEADER SECTION -->
  <g transform="translate(30, 32)">
    <!-- Order of Red Banner Emblem (Left) -->
    <g transform="translate(5, 5)">
      <circle cx="28" cy="28" r="24" fill="none" stroke="#681212" stroke-width="2" opacity="0.75" />
      <circle cx="28" cy="28" r="20" fill="none" stroke="#2b1a08" stroke-width="1" opacity="0.5" />
      <path d="M 16 18 Q 28 8, 40 18 Q 42 38, 28 46 Q 14 38, 16 18 Z" fill="#681212" opacity="0.65" />
      <text x="28" y="26" font-family="sans-serif" font-size="7" font-weight="bold" fill="#fff" text-anchor="middle">СССР</text>
    </g>

    <!-- Main Title "ГРОЗНЕНСКИЙ РАБОЧИЙ" -->
    <!-- Top Part: ГРОЗНЕНСКИЙ -->
    <text x="400" y="26" font-family="Impact, 'Arial Black', sans-serif" font-size="28" font-weight="900" fill="#1f1305" letter-spacing="9" text-anchor="middle">ГРОЗНЕНСКИЙ</text>
    <!-- Bottom Part: РАБОЧИЙ -->
    <text x="400" y="74" font-family="Impact, 'Arial Black', sans-serif" font-size="52" font-weight="900" fill="#1f1305" letter-spacing="6" text-anchor="middle">РАБОЧИЙ</text>

    <!-- Date / Issue Box (Right Side) -->
    <g transform="translate(640, 5)">
      <rect x="0" y="0" width="95" height="70" fill="none" stroke="#2b1a08" stroke-width="1.2" opacity="0.7" />
      <text x="47.5" y="16" font-family="serif" font-size="11" font-weight="bold" fill="#1f1305" text-anchor="middle">1917 — 2026</text>
      <line x1="10" y1="22" x2="85" y2="22" stroke="#2b1a08" stroke-width="0.8" opacity="0.5" />
      <text x="47.5" y="38" font-family="serif" font-size="10" font-weight="bold" fill="#1f1305" text-anchor="middle">ГРОЗНЫЙ</text>
      <text x="47.5" y="54" font-family="serif" font-size="9" fill="#1f1305" text-anchor="middle">ФОТОАРХИВ</text>
    </g>
  </g>

  <!-- Double Rule Under Masthead -->
  <line x1="30" y1="122" x2="770" y2="122" stroke="#1f1305" stroke-width="3" opacity="0.8" />
  <line x1="30" y1="127" x2="770" y2="127" stroke="#1f1305" stroke-width="1" opacity="0.8" />

  <!-- Newspaper Column Guide Lines -->
  <g stroke="#2b1a08" stroke-width="0.6" opacity="0.18" stroke-dasharray="2 3">
    <line x1="220" y1="135" x2="220" y2="480" />
    <line x1="580" y1="135" x2="580" y2="480" />
  </g>

  <!-- ARCHIVAL PHOTO CONTAINER (Featured Placeholder Graphic) -->
  <g transform="translate(50, 145)">
    <!-- Outer Frame Box -->
    <rect x="0" y="0" width="700" height="320" fill="#baaa87" stroke="#2b1a08" stroke-width="1.5" filter="url(#paper-texture)" />
    <!-- Photo Inner Boundary -->
    <rect x="12" y="12" width="676" height="265" fill="#9c8a68" opacity="0.75" />
    <rect x="12" y="12" width="676" height="265" fill="url(#photo-halftone)" />

    <!-- Chechen Mountain & Ancient Tower Silhouette (Graphic Motif) -->
    <g opacity="0.5" fill="#241708">
      <!-- Caucasus Mountain Peaks -->
      <path d="M 12 277 L 140 160 L 230 220 L 380 110 L 520 230 L 688 277 Z" opacity="0.4" />
      <!-- Ancient Caucasian Battle Tower (Нийской / Итум-Кале style) -->
      <path d="M 430 277 L 438 150 L 448 140 L 458 150 L 466 277 Z" opacity="0.85" />
      <!-- Tower Roof Pyramid -->
      <path d="M 436 140 L 448 115 L 460 140 Z" opacity="0.95" />
      <!-- Tower Machicolations & Windows -->
      <rect x="444" y="160" width="8" height="12" fill="#9c8a68" opacity="0.9" />
      <rect x="445" y="195" width="6" height="9" fill="#9c8a68" opacity="0.9" />
    </g>

    <!-- Photo Caption Strip -->
    <rect x="12" y="277" width="676" height="31" fill="#ac9c7a" stroke="#2b1a08" stroke-width="1" />
    <line x1="28" y1="292" x2="480" y2="292" stroke="#2b1a08" stroke-width="1.5" opacity="0.3" stroke-dasharray="10 3 20 4 6 2 15 3" />
    <text x="675" y="296" font-family="serif" font-size="10" font-style="italic" fill="#2b1a08" opacity="0.6" text-anchor="end">Архив газеты «Грозненский рабочий»</text>
  </g>

  <!-- Archival Round Ink Stamp (Bottom Corner) -->
  <g transform="translate(110, 435) rotate(-14)" opacity="0.32">
    <circle cx="0" cy="0" r="32" fill="none" stroke="#681212" stroke-width="2" stroke-dasharray="5 2 8 2" />
    <text x="0" y="-4" font-family="serif" font-size="8" font-weight="bold" fill="#681212" text-anchor="middle">ЧИ АССР</text>
    <text x="0" y="8" font-family="serif" font-size="9" font-weight="bold" fill="#681212" text-anchor="middle">ГРОЗНЫЙ</text>
  </g>

  <!-- Vertical Crease / Page Fold Line down center -->
  <line x1="400" y1="0" x2="400" y2="520" stroke="#120901" stroke-width="3" opacity="0.14" />
  <line x1="399" y1="0" x2="399" y2="520" stroke="#fff" stroke-width="1" opacity="0.08" />

  <!-- Outer Discoloration Vignette Layer -->
  <rect width="100%" height="100%" fill="url(#vignette)" style="mix-blend-mode: multiply;" />

  <!-- Worn Border Outline -->
  <rect x="2" y="2" width="796" height="516" fill="none" stroke="#211304" stroke-width="3" opacity="0.35" stroke-dasharray="1 5 12 2 8 4" />
</svg>
